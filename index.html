<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Wealth Engine - Verified Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .toggle-bg:after { content: ''; position: absolute; top: 2px; left: 2px; background: white; border-radius: 99px; height: 16px; width: 16px; transition: all .3s; }
        input:checked + .toggle-bg:after { transform: translateX(20px); }
        input:checked + .toggle-bg { background-color: #4f46e5; }
        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-center bg-slate-800/50 p-8 rounded-[2rem] border border-slate-700">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-indigo-400 uppercase">Family Wealth Engine</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Joint Family Strategy • Cash-Flow Logic (Non-Compounding Principal)</p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3 no-print">
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg">Export Report</button>
                <button onclick="resetToZero()" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest">Wipe Memory</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                
                <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black uppercase text-slate-400 tracking-widest italic">1. Family Members (Salaries)</h3>
                        <button onclick="addMember()" class="no-print text-[10px] font-black text-indigo-400 uppercase underline">+ Add Member</button>
                    </div>
                    <div id="memberList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 border-rose-900/30">
                    <label class="block text-[10px] font-black text-rose-500 uppercase mb-4 tracking-widest">Total Joint Family Expenses (Annual ₹)</label>
                    <input type="text" id="exp" value="30,00,000" oninput="handleInput(this); calculate(); saveToLocal()" class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-2xl font-black text-2xl text-rose-400 outline-none">
                </div>

                <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black uppercase text-slate-400 tracking-widest italic">2. Shared Investment Matrix</h3>
                        <div class="flex gap-2 no-print">
                            <select id="catSel" class="bg-slate-700 text-[9px] font-bold uppercase p-2 rounded-xl border border-slate-600">
                                <option value="7.0">FD (Major Bank)</option>
                                <option value="8.5">Small Finance Bank</option>
                                <option value="7.5">Govt Schemes</option>
                                <option value="3.5">Rental Income</option>
                            </select>
                            <button onclick="addCategorizedRow()" class="bg-indigo-600 px-4 py-2 rounded-xl font-black text-[9px] uppercase tracking-widest">+ Add Asset</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-left"><tbody id="assetBody" class="divide-y divide-slate-700"></tbody></table></div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-2xl text-center space-y-4">
                    <p class="text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-1 italic">Combined Monthly Surplus</p>
                    <h2 class="text-5xl font-black tracking-tighter" id="monthlySurplusDisplay">₹0</h2>
                    <div class="pt-4 border-t border-indigo-500/50">
                        <p class="text-[10px] font-bold text-indigo-100 uppercase italic">Yearly Surplus: <span id="yearlySurplusDisplay">₹0</span></p>
                    </div>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                    <h3 class="text-[10px] font-black uppercase text-indigo-400 tracking-widest">Wealth Strategy</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[8px] text-slate-500 uppercase">SIP Returns %</label><input type="number" id="sipRet" value="12" oninput="calculate(); saveToLocal()" class="w-full bg-slate-900 p-2 rounded-xl text-indigo-300 font-bold border border-slate-700"></div>
                        <div><label class="text-[8px] text-slate-500 uppercase">Inflation %</label><input type="number" id="infRet" value="8" oninput="calculate(); saveToLocal()" class="w-full bg-slate-900 p-2 rounded-xl text-rose-300 font-bold border border-slate-700"></div>
                    </div>
                    <div class="pt-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase italic">Reinvest Surplus: <span id="reinvestLabel">80%</span></label>
                        <input type="range" id="reinvestRate" min="0" max="100" value="80" oninput="document.getElementById('reinvestLabel').innerText=this.value+'%'; calculate(); saveToLocal()" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    </div>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">30-Year Forecast (Corrected Logic)</h3>
                        <label class="relative inline-flex items-center cursor-pointer no-print">
                            <input type="checkbox" id="adjToggle" class="sr-only peer" onchange="calculate(); saveToLocal()">
                            <div class="w-10 h-5 bg-slate-700 rounded-full peer-checked:bg-indigo-600 transition-all after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        </label>
                    </div>
                    <div id="forecastTable" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleInput(el) {
            let val = el.value.replace(/,/g, '');
            if (!val || isNaN(val)) { el.value = "0"; return; }
            el.value = parseFloat(val).toLocaleString('en-IN');
        }

        function addMember(name="Member Name", salary=0) {
            const div = document.createElement('div');
            div.className = "member-row p-4 bg-slate-900/50 rounded-2xl border border-slate-700/50 space-y-3 relative";
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); calculate(); saveToLocal()" class="no-print absolute top-2 right-2 text-slate-600 hover:text-rose-500">✕</button>
                <input type="text" value="${name}" oninput="updateMemberSelects(); saveToLocal()" class="m_name bg-transparent text-[10px] font-black uppercase tracking-widest text-indigo-300 outline-none w-full">
                <input type="text" value="${salary.toLocaleString('en-IN')}" oninput="handleInput(this); calculate(); saveToLocal()" class="m_sal w-full bg-slate-800 p-2 rounded-xl font-black text-sm outline-none border border-slate-700">
                <p class="text-[8px] text-slate-600 italic">Net After Tax: <span class="m_net text-emerald-500">₹0</span></p>
            `;
            document.getElementById('memberList').appendChild(div);
            updateMemberSelects();
            calculate();
        }

        function updateMemberSelects() {
            const names = Array.from(document.querySelectorAll('.m_name')).map(i => i.value);
            document.querySelectorAll('.o_in').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
                select.value = currentVal;
            });
        }

        function addCategorizedRow() {
            const sel = document.getElementById('catSel');
            addRow(sel.options[sel.selectedIndex].text, 0, parseFloat(sel.value));
        }

        function addRow(name="Asset", p=0, y=0, owner="") {
            const names = Array.from(document.querySelectorAll('.m_name')).map(i => i.value);
            const tr = document.createElement('tr');
            tr.className = "asset-row";
            tr.innerHTML = `
                <td class="py-4"><input type="text" value="${name}" oninput="saveToLocal()" class="name_in bg-transparent font-bold text-[10px] outline-none w-24 italic text-slate-500"></td>
                <td class="py-4"><input type="text" value="${p.toLocaleString('en-IN')}" class="p_in bg-transparent border-b border-slate-700 font-black text-xs w-28 outline-none text-indigo-300" oninput="handleInput(this); calculate(); saveToLocal()"></td>
                <td class="py-4"><input type="number" value="${y}" class="y_in bg-transparent border-b border-slate-700 font-black text-xs w-10 outline-none text-emerald-400" oninput="calculate(); saveToLocal()"></td>
                <td class="py-4"><select class="o_in bg-slate-700 p-1 rounded font-bold text-[9px]" onchange="calculate(); saveToLocal()">${names.map(n => `<option value="${n}" ${n===owner?'selected':''}>${n}</option>`).join('')}</select></td>
                <td class="py-4 text-right no-print"><button onclick="this.closest('tr').remove(); calculate(); saveToLocal()" class="text-slate-600 hover:text-rose-500">✕</button></td>
            `;
            document.getElementById('assetBody').appendChild(tr);
            calculate();
        }

        function calculateTax(income) {
            let taxable = Math.max(0, income - 75000); 
            if (taxable <= 1200000) return 0;
            let tax = 0;
            const slabs = [400000, 800000, 1200000, 1600000, 2000000, 2400000];
            const rates = [0.05, 0.10, 0.15, 0.20, 0.25, 0.30];
            slabs.forEach((s, i) => { if (taxable > s) tax += (Math.min(taxable, slabs[i+1] || 9999999999) - s) * rates[i]; });
            return tax * 1.04;
        }

        function calculate() {
            const exp = parseFloat(document.getElementById('exp').value.replace(/,/g, '')) || 0;
            const reinvestRate = parseInt(document.getElementById('reinvestRate').value) / 100;
            const sipRet = parseFloat(document.getElementById('sipRet').value) / 100;
            const inf = parseFloat(document.getElementById('infRet').value) / 100;
            const isAdj = document.getElementById('adjToggle').checked;

            const members = Array.from(document.querySelectorAll('.member-row')).map(row => ({
                name: row.querySelector('.m_name').value,
                sal: parseFloat(row.querySelector('.m_sal').value.replace(/,/g, '')) || 0,
                income: 0,
                netUI: row.querySelector('.m_net')
            }));

            let totalPrincipal = 0;
            document.querySelectorAll('.asset-row').forEach(row => {
                const p = parseFloat(row.querySelector('.p_in').value.replace(/,/g, '')) || 0;
                const y = parseFloat(row.querySelector('.y_in').value) || 0;
                const o = row.querySelector('.o_in').value;
                const m = members.find(m => m.name === o);
                if (m) m.income += (p * y) / 100;
                totalPrincipal += p;
            });

            let totalNet = 0;
            members.forEach(m => {
                const tax = calculateTax(m.sal + m.income);
                const net = (m.sal + m.income) - tax;
                m.netUI.innerText = '₹' + Math.round(net).toLocaleString('en-IN');
                totalNet += net;
            });

            const annualSurplus = totalNet - exp;
            const monthlySurplus = annualSurplus / 12;
            const monthlySIP = Math.max(0, monthlySurplus * reinvestRate);

            document.getElementById('monthlySurplusDisplay').innerText = '₹' + Math.max(0, Math.round(monthlySurplus)).toLocaleString('en-IN');
            document.getElementById('yearlySurplusDisplay').innerText = '₹' + Math.max(0, Math.round(annualSurplus)).toLocaleString('en-IN');

            let html = "";
            [5, 10, 15, 20, 25, 30].forEach(yr => {
                // CORRECTED LOGIC: Initial Principal is FIXED. Only monthlySIP compounds.
                const r = sipRet / 12;
                const n = yr * 12;
                const fvSIP = monthlySIP * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);
                
                let totalWealth = totalPrincipal + fvSIP;

                if (isAdj) totalWealth = totalWealth / Math.pow(1 + inf, yr);
                
                html += `<div class="flex justify-between items-center py-2 border-b border-slate-700/50"><span class="text-[9px] font-bold text-slate-500 uppercase">${yr} Years</span><span class="text-sm font-black text-emerald-400">₹${Math.round(totalWealth/10000000).toLocaleString('en-IN')} Cr</span></div>`;
            });
            document.getElementById('forecastTable').innerHTML = html;
        }

        function saveToLocal() {
            const data = {
                exp: document.getElementById('exp').value,
                reinvest: document.getElementById('reinvestRate').value,
                sipRet: document.getElementById('sipRet').value,
                infRet: document.getElementById('infRet').value,
                adj: document.getElementById('adjToggle').checked,
                members: Array.from(document.querySelectorAll('.member-row')).map(m => ({ n: m.querySelector('.m_name').value, s: m.querySelector('.m_sal').value })),
                assets: Array.from(document.querySelectorAll('.asset-row')).map(a => ({ n: a.querySelector('.name_in').value, p: a.querySelector('.p_in').value, y: a.querySelector('.y_in').value, o: a.querySelector('.o_in').value }))
            };
            localStorage.setItem('family_wealth_v1', JSON.stringify(data));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('family_wealth_v1');
            if (!saved) { 
                addMember("Shravan", 0); addMember("Lalitha", 0); addMember("Pavan", 0); addMember("Pavani", 0); addMember("Rajya Lakhsmi", 0); 
                return; 
            }
            const data = JSON.parse(saved);
            document.getElementById('exp').value = data.exp;
            document.getElementById('reinvestRate').value = data.reinvest;
            document.getElementById('sipRet').value = data.sipRet;
            document.getElementById('infRet').value = data.infRet;
            document.getElementById('adjToggle').checked = data.adj;
            document.getElementById('memberList').innerHTML = "";
            data.members.forEach(m => addMember(m.n, parseFloat(m.s.replace(/,/g,''))));
            document.getElementById('assetBody').innerHTML = "";
            data.assets.forEach(a => addRow(a.n, parseFloat(a.p.replace(/,/g,'')), parseFloat(a.y), a.o));
            calculate();
        }

        function resetToZero() { localStorage.removeItem('family_wealth_v1'); location.reload(); }
        window.onload = loadFromLocal;
    </script>
</body>
</html>
